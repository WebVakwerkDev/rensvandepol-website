<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MCP Color Screen</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { transition: background-color 250ms linear; }
  </style>
</head>
<body>
<script>
  async function refresh() {
    try {
      const r = await fetch("/api/color", { cache: "no-store" });
      const j = await r.json();
      const color = j?.color || "#000000";
      document.body.style.backgroundColor = color;
    } catch {
      // als de API even faalt, laat de kleur staan
    }
  }

  refresh();
  setInterval(refresh, 1000); // 1x per seconde
</script>
</body>
</html>
