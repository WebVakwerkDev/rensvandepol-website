name: Deploy (git pull + docker compose)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show docker versions
        run: |
          docker --version
          docker compose version

      - name: Deploy with Docker Compose
        shell: bash
        run: |
          set -e

          # Ga ervan uit dat docker-compose.yml in repo root staat
          # (staat in jouw repo root). :contentReference[oaicite:1]{index=1}

          echo "Pull (if images are remote) and build (if Dockerfiles exist)..."
          docker compose pull || true
          docker compose build --pull

          echo "Start / recreate stack..."
          docker compose up -d --remove-orphans

          echo "Running containers:"
          docker compose ps
