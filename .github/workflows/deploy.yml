name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest  

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build the Docker image
      run: docker build -t stijn0vp/renswebsite:latest .

    - name: Push Docker image to Docker Hub
      run: docker push stijn0vp/renswebsite:latest

  deploy:
    runs-on: [self-hosted]
    needs: build 

    steps:
    - name: Deploy container
      run: |
        docker ps -q -f name=renswebsite && docker stop renswebsite || echo "Container renswebsite is not running"

        docker ps -a -q -f name=renswebsite && docker rm renswebsite || echo "Container renswebsite does not exist"

        docker images -q stijn0vp/renswebsite:latest && docker image rm stijn0vp/renswebsite:latest || echo "Image stijn0vp/renswebsite:latest does not exist locally"

        docker pull stijn0vp/renswebsite:latest

        docker run --restart always -d -p 8081:80 --name renswebsite stijn0vp/renswebsite:latest
        docker ps -a
