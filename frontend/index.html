<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Kleur Controller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.5s ease;
            overflow: hidden;
        }

        .color-display {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: black;
            text-shadow: 0 0 20px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease;
        }

        .subtitle {
            margin-top: 2rem;
            font-size: clamp(1rem, 3vw, 1.5rem);
            opacity: 0.7;
            color: black;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: rgba(255, 0, 0, 0.9);
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            display: none;
        }

        .error.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="error" id="error"></div>
    <div class="color-display">
        <h1 id="colorName">BLAUW</h1>
        <p class="subtitle">Bestuur me via je AI en de MCP server</p>
    </div>

    <script>
        const BACKEND_URL = 'http://172.16.2.11:3000';
        let currentColor = 'blue';

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 3000);
        }

        async function fetchColor() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/color`);
                if (!response.ok) throw new Error('Kon kleur niet ophalen');
                
                const data = await response.json();
                updateColor(data.color);
            } catch (err) {
                console.error('Fout bij ophalen kleur:', err);
                showError('Kan geen verbinding maken met de server');
            }
        }

        function updateColor(color) {
            if (color === currentColor) return;
            
            currentColor = color;
            document.body.style.backgroundColor = color;
            
            // Zet kleurnaam in het groot
            const colorName = color.toUpperCase();
            document.getElementById('colorName').textContent = colorName;
            
            // Trigger animatie opnieuw
            const h1 = document.getElementById('colorName');
            h1.style.animation = 'none';
            setTimeout(() => {
                h1.style.animation = 'fadeIn 0.5s ease';
            }, 10);
        }

        // Poll elke seconde voor updates
        setInterval(fetchColor, 1000);
        
        // Haal meteen bij laden op
        fetchColor();
    </script>
</body>
</html>
