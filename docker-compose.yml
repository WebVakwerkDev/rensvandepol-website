services:
  web:
    build: ./web
    container_name: mcp-color-web
    environment:
      # Jouw bestaande (tunnel) MCP endpoint:
      # voorbeeld: https://mcp.jouwdomein.nl/mcp
      - MCP_URL=${MCP_URL}

      # Optioneel (sterk aangeraden): auth header richting MCP (als jij die afdwingt)
      # - MCP_BEARER_TOKEN=${MCP_BEARER_TOKEN}

      # Optioneel: laat alleen jouw domein de wijzig-call doen (server-side check)
      - ALLOW_ORIGIN=https://mcp.stijnvandepol.nl
    ports:
      - "8080:8080"
    restart: unless-stopped
