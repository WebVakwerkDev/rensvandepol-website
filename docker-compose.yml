version: '3.8'

services:
  # MCP Backend Server
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: mcp-color-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - mcp-state:/app/state
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mcp-network

  # Web Frontend
  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: mcp-webapp
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - mcp-server
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mcp-network

volumes:
  mcp-state:
    driver: local

networks:
  mcp-network:
    driver: bridge