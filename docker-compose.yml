services:
  barbershop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barber-dolly
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
